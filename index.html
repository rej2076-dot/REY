<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REY - Distributed AI</title>
    <style>
        body {
            background-color: #000;
            color: #0ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #ui-container {
            position: relative;
            width: 800px; /* Настрой под размер своих панелей */
            height: 600px;
        }
        .ui-panel {
            position: absolute;
            pointer-events: none;
        }
        #greeting {
            position: absolute;
            top: 20%;
            left: 10%;
            width: 80%;
            text-align: center;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #0ff;
        }
        #user-input {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px;
            width: 60%;
            outline: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <!-- Твои картинки из папки static -->
        <img src="static/ui_panel_left.png" class="ui-panel" style="left: 0; top: 0;">
        
        <!-- Текст ответа РЭЙ -->
        <div id="greeting">Система РЭЙ готова к инициализации...</div>
        
        <!-- Поле ввода -->
        <input type="text" id="user-input" placeholder="Введите команду для РЭЙ..." autofocus>
    </div>

    <!-- Подключаем логику -->
    <script src="static/brain.js"></script>
</body>
</html>
